<!DOCTYPE html>
<html>
  <head>
    <title>Noten lernen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/lucide@latest"></script>

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        background: #ffffff;
      }

      main {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
        margin: 10px;
        display: grid;
        place-items: center;
      }

      .trainer {
        width: 100%;
        max-width: 100%;
        display: grid;
        gap: 2.5vh;
        align-content: center;
        justify-items: center;
      }

      .toolbar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
      }

      .auth-panel {
        width: min(92vw, 760px);
        padding: 12px 14px;
        border: 1px solid #d7d7d7;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        display: grid;
        gap: 10px;
      }

      .auth-panel.is-disabled {
        opacity: 0.72;
      }

      .auth-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .auth-field {
        min-width: min(240px, 42vw);
        padding: 10px 12px;
        border: 1px solid #d7d7d7;
        border-radius: 12px;
        font: inherit;
      }

      .auth-status {
        margin: 0;
        text-align: center;
        font-size: 14px;
        color: #5f5f5f;
      }

      .auth-status[data-state="error"] {
        color: #b22b2b;
      }

      .auth-status[data-state="success"] {
        color: #1d7a3c;
      }

      .level-indicator {
        min-width: 124px;
        padding: 8px 14px;
        border: 1px solid #d7d7d7;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        text-align: center;
        line-height: 1.1;
      }

      .level-indicator[data-signal="low"] {
        border-color: #d95c5c;
        background: rgba(255, 235, 235, 0.95);
      }

      .level-indicator[data-signal="mid"] {
        border-color: #d9a43b;
        background: rgba(255, 245, 217, 0.95);
      }

      .level-indicator[data-signal="high"] {
        border-color: #3eaf63;
        background: rgba(231, 250, 236, 0.95);
      }

      .level-indicator.is-hidden {
        display: none;
      }

      .level-indicator-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #7a7a7a;
      }

      .level-indicator[data-signal="low"] .level-indicator-label,
      .level-indicator[data-signal="low"] .level-indicator-value {
        color: #9f1f1f;
      }

      .level-indicator[data-signal="mid"] .level-indicator-label,
      .level-indicator[data-signal="mid"] .level-indicator-value {
        color: #8a5a00;
      }

      .level-indicator[data-signal="high"] .level-indicator-label,
      .level-indicator[data-signal="high"] .level-indicator-value {
        color: #1d7a3c;
      }

      .level-indicator-value {
        display: block;
        margin-top: 3px;
        font-size: 18px;
        font-weight: 700;
        color: #111111;
      }

      .toolbar-button {
        width: 46px;
        height: 46px;
        border: 1px solid #d7d7d7;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #111111;
        cursor: pointer;
      }

      .toolbar-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .toolbar-button.is-active {
        border-color: #111111;
        background: #111111;
        color: #ffffff;
      }

      .toolbar-button svg {
        width: 20px;
        height: 20px;
        stroke-width: 2.25;
      }

      .toolbar-button[data-badge] {
        position: relative;
      }

      .toolbar-button[data-badge]::after {
        content: attr(data-badge);
        position: absolute;
        right: -1px;
        bottom: -1px;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #111111;
        color: #ffffff;
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      .library-panel {
        width: min(92vw, 760px);
        padding: 18px 20px;
        border: 1px solid #d7d7d7;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.95);
        display: grid;
        gap: 18px;
      }

      .library-panel.is-hidden {
        display: none;
      }

      .sheet-music.is-hidden {
        display: none;
      }

      .library-group {
        display: grid;
        gap: 10px;
      }

      .library-group-title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #666666;
      }

      .library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        gap: 10px;
      }

      .library-note {
        padding: 10px 12px;
        border: 1px solid #d7d7d7;
        border-radius: 14px;
        background: #ffffff;
        display: grid;
        gap: 4px;
        text-align: center;
      }

      .library-note.is-unknown {
        border-color: #dcdcdc;
        background: #f2f2f2;
        color: #9a9a9a;
      }

      .library-note-score {
        font-size: 13px;
        font-weight: 600;
      }

      .library-note-preview {
        position: relative;
        height: 76px;
        border-radius: 10px;
        overflow: hidden;
      }

      .library-note-stage {
        position: absolute;
        inset: 0;
      }

      .library-note-preview .staff-line,
      .library-note-preview .ledger-line {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 28px;
        height: 2px;
        background: #161616;
        transform: translate(-50%, calc(-50% + var(--offset) + var(--focus-offset, 0em)));
      }

      .library-note-preview .note {
        top: 50%;
        left: 50%;
        width: 18px;
        height: 54px;
        background-color: #111111;
        transform: translate(-50%, calc(-50% + var(--offset) + var(--focus-offset, 0em)));
      }

      .sheet-music {
        font-size: min(2.52vw, 1.6vh);
        width: max-content;
        max-width: 100%;
        margin: 0 auto;
        padding-left: 16em;
        overflow: visible;
      }

      .sheet-music-double {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: clamp(44px, 5vw, 92px);
        width: calc(100vw - 80px);
        max-width: 100%;
        padding: 0 10px;
        position: relative;
        font-size: min(1.5vw, 1.02vh);
        align-items: start;
      }

      .sheet-music-double::before {
        content: "";
        position: absolute;
        top: 2em;
        bottom: 2em;
        left: 50%;
        border-left: 2px dashed rgba(17, 17, 17, 0.35);
        transform: translateX(-50%);
      }

      .sheet-music-double.is-hidden {
        display: none;
      }

      .sheet-music-double .bar {
        width: min(100%, 26em);
      }

      .sheet-music-double .bar:first-child {
        justify-self: end;
      }

      .sheet-music-double .bar:last-child {
        justify-self: start;
      }

      .sheet-music-double .stave-header {
        left: -11em;
        width: 11em;
      }

      .sheet-music-double .clef-symbol[data-clef="treble"] {
        left: -8.9em;
      }

      .sheet-music-double .clef-symbol[data-clef="bass"] {
        left: -8.1em;
      }

      .bar {
        position: relative;
        width: 40em;
        height: 34em;
        background-color: #ffffff;
        background-image: var(--svg-stave);
        background-repeat: repeat-x;
        background-position: center;
        background-size: auto 16em;
      }

      .stave-header {
        position: absolute;
        top: 0;
        left: -16em;
        width: 16em;
        height: 34em;
        background-color: #ffffff;
        background-image: var(--svg-stave-header);
        background-repeat: no-repeat;
        background-position: center;
        background-size: auto 16em;
        z-index: 0;
      }

      .clef-symbol {
        position: absolute;
        left: -13.3em;
        top: 50%;
        width: 6.8em;
        height: 20em;
        transform: translateY(-50%);
        user-select: none;
        z-index: 2;
        pointer-events: none;
      }

      .clef-symbol[data-clef="treble"] {
        width: 6.8em;
        height: 20em;
      }

      .clef-symbol[data-clef="bass"] {
        left: -12.7em;
        width: 1.6em;
        height: auto;
        text-align: center;
        font-size: 11.8em;
        line-height: 1;
      }

      .clef-symbol svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .clef-symbol path,
      .clef-symbol circle {
        fill: #000000;
        stroke: none;
      }

      .bar-line {
        position: absolute;
        top: 0;
        right: 0;
        width: 1em;
        height: 34em;
        background-color: transparent;
        background-image: var(--svg-bar-line);
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }

      .bar-notes {
        position: absolute;
        inset: 0 1em 0 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        z-index: 1;
      }

      .note-slot {
        position: relative;
        height: 100%;
      }

      .note-badge {
        position: absolute;
        top: 50%;
        left: calc(50% + 1.25em);
        transform: translate(-50%, calc(-50% + var(--offset)));
        font-size: 1.9em;
        font-weight: 800;
        line-height: 1;
        color: #d62424;
        user-select: none;
        pointer-events: none;
        animation: noteBadgeFloat 1.5s ease-in-out infinite;
      }

      @keyframes noteBadgeFloat {
        0%,
        100% {
          transform: translate(-50%, calc(-50% + var(--offset)));
        }

        50% {
          transform: translate(-50%, calc(-50% + var(--offset) - 0.22em));
        }
      }

      .note {
        --note-color: #000000;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2.83em;
        height: 16em;
        background-color: var(--note-color);
        transform: translate(-50%, calc(-50% + var(--offset)));
        transition: background-color 120ms ease, filter 120ms ease;
      }

      .note.note-down {
        -webkit-mask-image: var(--svg-quarter-down);
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-size: auto 100%;
        mask-image: var(--svg-quarter-down);
        mask-repeat: no-repeat;
        mask-size: auto 100%;
      }

      .note.note-up {
        -webkit-mask-image: var(--svg-quarter-up);
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-size: auto 100%;
        mask-image: var(--svg-quarter-up);
        mask-repeat: no-repeat;
        mask-size: auto 100%;
      }

      .ledger-line {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4.8em;
        height: 0.28em;
        background: #000000;
        transform: translate(-50%, calc(-50% + var(--offset)));
      }

      .note-slot.is-current .note {
        filter: drop-shadow(0 0 0.4em rgba(0, 76, 255, 0.35));
      }

      .note.is-correct {
        --note-color: #1d9b39;
      }

      .note.is-wrong {
        --note-color: #d62424;
      }

      .midi-indicator {
        position: fixed;
        left: 10px;
        bottom: 10px;
        z-index: 20;
      }

      .midi-indicator-button {
        display: grid;
        place-items: center;
        color: #111111;
        cursor: default;
      }

      .midi-indicator-button svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.2;
      }

      .midi-indicator-button[data-state="disconnected"] {
        animation: midiPulse 1.8s ease-in-out infinite;
      }

      .midi-indicator-button[data-state="connected"] {
        color: #1d9b39;
      }

      .midi-tooltip {
        position: absolute;
        left: 58px;
        bottom: 50%;
        transform: translateY(50%);
        padding: 10px 12px;
        border-radius: 12px;
        background: #111111;
        color: #ffffff;
        font-size: 13px;
        line-height: 1.2;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
      }

      .midi-indicator:hover .midi-tooltip,
      .midi-indicator:focus-within .midi-tooltip {
        opacity: 1;
      }

      .midi-tooltip.is-hidden {
        display: none;
      }

      @keyframes midiPulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.06);
        }
      }

      .keyboard {
        position: relative;
        width: 100%;
        height: min(24vh, 220px);
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background: #f3f3f3;
        overflow: hidden;
      }

      .keyboard-levels {
        position: absolute;
        left: 10px;
        right: 10px;
        top: 8px;
        height: 10px;
        pointer-events: none;
        z-index: 4;
      }

      .keyboard-levels.is-hidden {
        display: none;
      }

      .keyboard-level-segment {
        position: absolute;
        top: 0;
        height: 100%;
        border-radius: 999px;
        background: rgba(217, 164, 59, 0.2);
      }

      .keyboard-level-segment.is-active {
        background: rgba(217, 164, 59, 0.6);
      }

      .keyboard-range-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .keyboard-keys {
        position: absolute;
        inset: 0;
      }

      .keyboard-keys.is-cut-mode {
        opacity: 0.5;
      }

      .range-bracket {
        position: absolute;
        top: 8px;
        width: 28px;
        height: calc(100% - 16px);
        border: 3px solid #111111;
        background: rgba(255, 255, 255, 0.26);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.45);
        pointer-events: auto;
        touch-action: none;
        cursor: grab;
      }

      .range-bracket::after {
        content: attr(data-note);
        position: absolute;
        top: -34px;
        left: 50%;
        transform: translateX(-50%);
        padding: 4px 8px;
        border-radius: 999px;
        background: #111111;
        color: #ffffff;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }

      .range-bracket.is-dragging {
        cursor: grabbing;
      }

      .range-bracket-start {
        border-right: 0;
        border-radius: 12px 0 0 12px;
        transform: translateX(-100%);
      }

      .range-bracket-end {
        border-left: 0;
        border-radius: 0 12px 12px 0;
      }

      .range-bracket.is-passive {
        border-color: rgba(17, 17, 17, 0.72);
        background: rgba(255, 255, 255, 0.12);
        cursor: default;
        pointer-events: none;
      }

      .range-bracket.is-passive::after {
        background: rgba(17, 17, 17, 0.84);
      }

      .range-bracket[data-range-role="bass"] {
        border-color: rgba(27, 111, 212, 0.92);
      }

      .range-bracket[data-range-role="treble"] {
        border-color: rgba(187, 40, 40, 0.92);
      }

      .range-bracket[data-range-role="bass"]::after {
        background: rgba(27, 111, 212, 0.92);
      }

      .range-bracket[data-range-role="treble"]::after {
        background: rgba(187, 40, 40, 0.92);
      }

      .white-keys {
        display: grid;
        grid-template-columns: repeat(52, 1fr);
        width: 100%;
        height: 100%;
      }

      .white-key {
        position: relative;
        border-right: 1px solid #d7d7d7;
        background: #ffffff;
        cursor: pointer;
      }

      .white-key[data-label]::after {
        content: attr(data-label);
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        font-size: 12px;
        font-weight: 600;
        color: #222222;
      }

      .white-key.is-in-range {
        background: #ffffff;
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.55);
      }

      .white-key.is-range-start,
      .white-key.is-range-end {
        background: #ffffff;
        box-shadow: inset 0 0 0 3px #000000;
      }

      .white-key.is-target {
        background: #dcecff;
      }

      .white-key.is-correct {
        background: #d9f5df;

        if (!supabaseClient || !authUser || isRemoteStateApplying) {
          return false;

        const payload = {
          user_id: authUser.id,
          email: authUser.email,
          ...collectPersistedState()
        };

        const { error } = await supabaseClient
          .from("trainer_progress")
          .upsert(payload, { onConflict: "user_id" });

        if (error) {
          setAuthStatus(`Speichern fehlgeschlagen: ${error.message}`, "error");
          return false;
        }

        setAuthStatus(`Angemeldet als ${authUser.email}. Fortschritt gespeichert (${reason}).`, "success");
        return true;

        if (!supabaseClient || !authUser || isRemoteStateApplying) {

        window.clearTimeout(remoteSaveTimer);
        remoteSaveTimer = window.setTimeout(() => {
          saveRemoteProgress(reason);
        }, 600);

        if (!supabaseClient || !authUser) {
          return;

        const { data, error } = await supabaseClient
          .from("trainer_progress")
          .select("*")
          .eq("user_id", authUser.id)
          .maybeSingle();

        if (error) {
          setAuthStatus(`Laden fehlgeschlagen: ${error.message}`, "error");
          return;
        }

        if (!data) {
          setAuthStatus(`Angemeldet als ${authUser.email}. Noch kein gespeicherter Fortschritt.`, "success");
          await saveRemoteProgress("initial");
          return;
        }

        applyPersistedState(data);
        setAuthStatus(`Angemeldet als ${authUser.email}. Fortschritt geladen.`, "success");

        if (!supabaseClient || authBusy) {
          return;

        const email = authEmailInput.value.trim();
        const password = authPasswordInput.value;

        if (!email || !password) {
          setAuthStatus("Bitte E-Mail und Passwort eingeben.", "error");
          return;
        }

        authBusy = true;
        updateAuthUi();

        const request = action === "sign-up"
          ? supabaseClient.auth.signUp({ email, password })
          : supabaseClient.auth.signInWithPassword({ email, password });

        const { data, error } = await request;
        authBusy = false;

        if (error) {
          updateAuthUi();
          setAuthStatus(error.message, "error");
          return;
        }

        authUser = data.user || data.session?.user || null;
        updateAuthUi();

        if (authUser) {
          await loadRemoteProgress();
        } else if (action === "sign-up") {
          setAuthStatus("Registrierung angelegt. Falls Mail-Bestätigung aktiv ist, bestätige zuerst deine E-Mail.", "success");
        }
      }

        await saveRemoteProgress("sign-out");
        const { error } = await supabaseClient.auth.signOut();
        authBusy = false;

        if (error) {

          setAuthStatus(error.message, "error");
          return;
        }

        authUser = null;
        authEmailInput.value = "";
        authPasswordInput.value = "";
        updateAuthUi();

        const { data, error } = await supabaseClient.auth.getSession();

          updateAuthUi();

        authUser = data.session?.user || null;
        updateAuthUi();

        if (authUser) {

        const decoratedNote = decorateNote(note, mode);
        const stage = document.createElement("div");
        stage.className = "library-note-stage";
        stage.style.setProperty("--focus-offset", `${decoratedNote.step}em`);

        for (const step of [-4, -2, 0, 2, 4]) {
          const staffLine = document.createElement("div");
          staffLine.className = "staff-line";
          staffLine.style.setProperty("--offset", noteOffset(step));
          stage.appendChild(staffLine);
        }

        for (const step of ledgerSteps(decoratedNote.step)) {
          const ledgerLine = document.createElement("div");
          ledgerLine.className = "ledger-line";
          ledgerLine.style.setProperty("--offset", noteOffset(step));
          stage.appendChild(ledgerLine);
        }

        const noteElement = document.createElement("div");
        noteElement.className = `note ${stemDirection(decoratedNote.step)}`;
        noteElement.style.setProperty("--offset", noteOffset(decoratedNote.step));
        stage.appendChild(noteElement);

        preview.appendChild(stage);

        return preview;
      }

      function createLibraryGroup(mode) {
        const group = document.createElement("section");
        group.className = "library-group";

        const title = document.createElement("h3");
        title.className = "library-group-title";
        title.textContent = srsModeConfigs[mode].label;
        group.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "library-grid";

        for (const note of rangeOptionsForMode(mode)) {
          const stat = noteStatFor(mode, note.name);
          const item = document.createElement("div");
          item.className = "library-note";

          if (!stat || stat.attempts === 0) {
            item.classList.add("is-unknown");
          }

          item.appendChild(createLibraryNotePreview(note, mode));

          const score = document.createElement("span");
          score.className = "library-note-score";
          score.textContent = !stat || stat.attempts === 0
            ? "noch nicht gelernt"
            : `${Math.round((stat.correct / stat.attempts) * 100)}% sicher`;
          item.appendChild(score);

          grid.appendChild(item);
        }

        group.appendChild(grid);
        return group;
      }

      function renderLibraryPanel() {
        libraryPanel.replaceChildren(
          createLibraryGroup("treble"),
          createLibraryGroup("bass")
        );
      }

      function updateLibraryUi() {
        toggleLibraryButton.classList.toggle("is-active", isLibraryVisible);
        libraryPanel.classList.toggle("is-hidden", !isLibraryVisible);
        updateModeUi();
      }

      function levelProgressForMode(mode) {
        const state = mode ? srsStates[mode] : null;

        if (!mode || !state) {
          return null;
        }

        return {
          level: Math.max(1, Math.min(srsConfig.maxLevel, state.level || 1)),
          maxLevel: srsConfig.maxLevel
        };
      }

      function updateLevelUi() {
        const progress = levelProgressForMode(activeSrsMode);

        if (!progress || !activeSrsMode) {
          levelIndicator.classList.add("is-hidden");
          delete levelIndicator.dataset.signal;
          renderKeyboardLevels();
          return;
        }

        let signal = "low";

        if (progress.level >= 4) {
          signal = "high";
        } else if (progress.level >= 2) {
          signal = "mid";
        }

        levelIndicator.classList.remove("is-hidden");
        levelIndicator.dataset.signal = signal;
        levelIndicatorLabel.textContent = `${srsModeConfigs[activeSrsMode].label} ${levelLabels[progress.level - 1] || "Level"}`;
        levelIndicatorValue.textContent = `${progress.level} / ${progress.maxLevel}`;
        renderKeyboardLevels();
      }

      function levelRangesForMode(mode) {
        return levelRangesByMode[mode] || [];
      }

      function renderKeyboardLevels() {
        const progress = levelProgressForMode(activeSrsMode);

        if (!isKeyboardVisible || !activeSrsMode || !progress) {
          keyboardLevels.classList.add("is-hidden");
          keyboardLevels.replaceChildren();
          return;
        }

        const levelRanges = levelRangesForMode(activeSrsMode);
        const fragment = document.createDocumentFragment();
        const keyboardRect = keyboard.getBoundingClientRect();

        for (let index = 0; index < levelRanges.length; index += 1) {
          const [startNote, endNote] = levelRanges[index];
          const startCenter = keyCenterInKeyboard(startNote);
          const endCenter = keyCenterInKeyboard(endNote);

          if (startCenter === null || endCenter === null) {
            continue;
          }

          const startKey = findKeyByNote(startNote);
          const endKey = findKeyByNote(endNote);
          if (!startKey || !endKey) {
            continue;
          }

          const startRect = startKey.getBoundingClientRect();
          const endRect = endKey.getBoundingClientRect();
          const left = startRect.left - keyboardRect.left;
          const right = endRect.right - keyboardRect.left;

          const segment = document.createElement("div");
          segment.className = "keyboard-level-segment";
          if (index < progress.level) {
            segment.classList.add("is-active");
          }
          segment.style.left = `${left}px`;
          segment.style.width = `${Math.max(8, right - left)}px`;
          fragment.appendChild(segment);
        }

        keyboardLevels.replaceChildren(fragment);
        keyboardLevels.classList.remove("is-hidden");
      }

      function currentLevelRange(mode) {
        const state = srsStates[mode] || createInitialSrsState(mode);
        return srsRangeFromState(mode, state);
      }

      function activeDoubleRange(mode) {
        const customRange = doubleSelectedRanges[mode];
        if (customRange) {
          return customRange;
        }

        return [...currentLevelRange(mode)];
      }

      function updateMidiUi(isConnected) {
        midiIndicatorButton.dataset.state = isConnected ? "connected" : "disconnected";
        midiTooltip.classList.toggle("is-hidden", isConnected);
      }

      function hasConnectedMidiOutput(midiAccess) {
        if (!midiAccess) {
          return false;
        }

        for (const output of midiAccess.outputs.values()) {
          if (output.state === "connected") {
            return true;
          }
        }

        return false;
      }

      function bindMidiOutputs(midiAccess) {
        midiOutputsRef = [];

        if (!midiAccess) {
          return;
        }

        for (const output of midiAccess.outputs.values()) {
          if (output.state === "connected") {
            midiOutputsRef.push(output);
          }
        }
      }

      function sendMidiToOutputs(data) {
        if (!Array.isArray(data) && !(data instanceof Uint8Array)) {
          return;
        }

        for (const output of midiOutputsRef) {
          try {
            output.send(data);
          } catch (error) {
            console.warn("[MIDI] Output senden fehlgeschlagen", output.name, error);
          }
        }
      }

      function hasConnectedMidiInput(midiAccess) {
        if (!midiAccess) {
          return false;
        }

        for (const input of midiAccess.inputs.values()) {
          if (input.state === "connected") {
            return true;
          }
        }

        return false;
      }

      function midiNumberToName(midi) {
        const semitone = semitoneNames[midi % 12];
        const octave = Math.floor(midi / 12) - 1;
        return `${semitone}${octave}`;
      }

      function displayNoteName(name) {
        if (name.startsWith("B")) {
          return `H${name.slice(1)}`;
        }

        return name;
      }

      function parseNoteName(name) {
        const [, letter, octaveText] = name.match(/^([A-G])(\d)$/);
        return { letter, octave: Number(octaveText) };
      }

      function diatonicValue(name) {
        const { letter, octave } = parseNoteName(name);
        return octave * 7 + noteLetters.indexOf(letter);
      }

      function semitoneValue(name) {
        const midiMap = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
        const { letter, octave } = parseNoteName(name);
        return (octave + 1) * 12 + midiMap[letter];
      }

      function buildRange(start, end, reference) {
        const startMidi = semitoneValue(start);
        const endMidi = semitoneValue(end);
        const referenceValue = diatonicValue(reference);
        const notes = [];

        for (let midi = startMidi; midi <= endMidi; midi += 1) {
          if (isBlackKey(midi)) {
            continue;
          }

          const name = midiNumberToName(midi);
          notes.push({
            name,
            midi,
            step: diatonicValue(name) - referenceValue
          });
        }

        return notes;
      }

      function activeNoteRange() {
        if (activeSrsMode) {
          const config = clefConfigs[activeSrsMode];
          return buildRange(selectedRange[0], selectedRange[1], config.reference);
        }

        return buildRange(selectedRange[0], selectedRange[1], clefConfigs.treble.reference);
      }

      function deriveClefForNote(noteName) {
        return semitoneValue(noteName) < semitoneValue("C4") ? "bass" : "treble";
      }

      function decorateNote(note, forcedClef = null) {
        const clef = forcedClef || deriveClefForNote(note.name);
        return {
          ...note,
          clef,
          step: diatonicValue(note.name) - diatonicValue(clefConfigs[clef].reference)
        };
      }

      function selectableRangeOptions() {
        return buildRange(selectableRange[0], selectableRange[1], clefConfigs.treble.reference);
      }

      function isBlackKey(midi) {
        return midiNumberToName(midi).includes("#");
      }

      function buildKeyboard() {
        let whiteIndex = 0;
        const whiteFragment = document.createDocumentFragment();
        const blackFragment = document.createDocumentFragment();

        for (let midi = keyboardRange.start; midi <= keyboardRange.end; midi += 1) {
          const keyName = midiNumberToName(midi);

          if (isBlackKey(midi)) {
            const key = document.createElement("div");
            key.className = "black-key";
            key.dataset.midi = String(midi);
            key.dataset.note = keyName;
            key.setAttribute("aria-hidden", "true");
            key.style.left = `calc((100% / 52) * ${whiteIndex})`;
            blackFragment.appendChild(key);
            continue;
          }

          whiteIndex += 1;
          const key = document.createElement("div");
          key.className = "white-key";
          key.dataset.midi = String(midi);
          key.dataset.note = keyName;
          key.setAttribute("aria-hidden", "true");
          whiteFragment.appendChild(key);
        }

        whiteKeysContainer.replaceChildren(whiteFragment);
        blackKeysContainer.replaceChildren(blackFragment);
      }

      function randomNote() {
        const availableNotes = activeNoteRange();
        const randomIndex = Math.floor(Math.random() * availableNotes.length);
        const note = decorateNote(availableNotes[randomIndex], activeSrsMode);
        const state = activeSrsState();
        return {
          ...note,
          isNew: Boolean(state?.newNotes?.includes(note.name))
        };
      }

      function rangeOptionsForMode(mode) {
        if (!mode) {
          return selectableRangeOptions();
        }

        const config = clefConfigs[mode];
        return buildRange(config.range[0], config.range[1], config.reference);
      }

      function clampSrsWindowStart(startIndex, windowSize, total) {
        return Math.min(Math.max(0, startIndex), Math.max(0, total - windowSize));
      }

      function createInitialSrsState(mode) {
        return {
          level: 1,
          attempts: [],
          newNotes: []
        };
      }

      function activeSrsState() {
        return activeSrsMode ? srsStates[activeSrsMode] : null;
      }

      function srsRangeFromState(mode, state) {
        const ranges = levelRangesForMode(mode);
        return ranges[Math.max(0, Math.min(ranges.length - 1, (state.level || 1) - 1))];
      }

      function notesInRange(mode, range) {
        const allNotes = rangeOptionsForMode(mode).map((note) => note.name);
        const startIndex = allNotes.indexOf(range[0]);
        const endIndex = allNotes.indexOf(range[1]);
        if (startIndex === -1 || endIndex === -1) {
          return [];
        }

        return allNotes.slice(startIndex, endIndex + 1);
      }

      function applySrsRange() {
        const state = activeSrsState();

        if (!activeSrsMode || !state) {
          return;
        }

        selectedRange = srsRangeFromState(activeSrsMode, state);
      }

      function currentSrsAccuracy() {
        const state = activeSrsState();

        if (!state || state.attempts.length === 0) {
          return null;
        }

        const correctAttempts = state.attempts.filter(Boolean).length;
        return correctAttempts / state.attempts.length;
      }

      function logSrsEvent(eventType, mode, state, extra = {}) {
        if (!mode || !state) {
          return;
        }

        const range = srsRangeFromState(mode, state);
        const accuracy = state.attempts.length
          ? Math.round((state.attempts.filter(Boolean).length / state.attempts.length) * 100)
          : null;

        console.log("[SRS]", {
          event: eventType,
          mode,
          level: state.level,
          range: `${range[0]}-${range[1]}`,
          attempts: state.attempts.length,
          accuracy,
          newNotes: state.newNotes,
          ...extra
        });
      }

      function updateSrsUi() {
        toggleSrsTrebleButton.classList.toggle("is-active", activeSrsMode === "treble");
        toggleSrsBassButton.classList.toggle("is-active", activeSrsMode === "bass");
        toggleRangeButton.disabled = activeSrsMode !== null;
        updateLevelUi();
      }

      function maybeAdjustSrsRange() {
        const state = activeSrsState();

        if (!activeSrsMode || !state || state.attempts.length < srsConfig.sampleSize) {
          return false;
        }

        const accuracy = currentSrsAccuracy();
        const canGrow = state.level < levelRangesForMode(activeSrsMode).length;
        const canShrink = state.level > 1;

        if (accuracy >= srsConfig.growThreshold && canGrow) {
          const previousRange = srsRangeFromState(activeSrsMode, state);
          state.level += 1;

          state.attempts = [];
          const nextRange = srsRangeFromState(activeSrsMode, state);
          const previousNotes = new Set(notesInRange(activeSrsMode, previousRange));
          state.newNotes = notesInRange(activeSrsMode, nextRange).filter((noteName) => !previousNotes.has(noteName));
          applySrsRange();
          logSrsEvent("level-up", activeSrsMode, state, {
            previousRange: `${previousRange[0]}-${previousRange[1]}`,
            nextRange: `${nextRange[0]}-${nextRange[1]}`
          });
          updateSrsUi();
          return true;
        }

        if (accuracy < srsConfig.shrinkThreshold && canShrink) {
          const previousRange = srsRangeFromState(activeSrsMode, state);
          state.level -= 1;
          state.attempts = [];
          state.newNotes = [];
          applySrsRange();
          const nextRange = srsRangeFromState(activeSrsMode, state);
          logSrsEvent("level-down", activeSrsMode, state, {
            previousRange: `${previousRange[0]}-${previousRange[1]}`,
            nextRange: `${nextRange[0]}-${nextRange[1]}`
          });
          updateSrsUi();
          return true;
        }

        return false;
      }

      function recordSrsAttempt(isCorrect) {
        const state = activeSrsState();

        if (!activeSrsMode || !state) {
          return false;
        }

        state.attempts.push(isCorrect);

        if (state.attempts.length > srsConfig.sampleSize) {
          state.attempts.shift();
        }

        logSrsEvent("attempt", activeSrsMode, state, {
          result: isCorrect ? "correct" : "wrong"
        });

        const changedRange = maybeAdjustSrsRange();
        queueRemoteSave("srs-attempt");
        updateSrsUi();
        return changedRange;
      }

      function applyManualSrsLevel(mode, nextLevel) {
        const ranges = levelRangesForMode(mode);

        if (!mode || ranges.length === 0) {
          return false;
        }

        const state = srsStates[mode] = srsStates[mode] || createInitialSrsState(mode);
        const previousRange = srsRangeFromState(mode, state);
        const clampedLevel = Math.max(1, Math.min(ranges.length, nextLevel));

        if (state.level === clampedLevel) {
          logSrsEvent("level-unchanged", mode, state);
          return false;
        }

        state.level = clampedLevel;
        state.attempts = [];
        const nextRange = srsRangeFromState(mode, state);
        const previousNotes = new Set(notesInRange(mode, previousRange));
        state.newNotes = notesInRange(mode, nextRange).filter((noteName) => !previousNotes.has(noteName));

        if (activeSrsMode === mode) {
          applySrsRange();
        }

        logSrsEvent("level-manual", mode, state, {
          previousRange: `${previousRange[0]}-${previousRange[1]}`,
          nextRange: `${nextRange[0]}-${nextRange[1]}`
        });
        queueRemoteSave("manual-level");
        updateSrsUi();
        syncRangeBracketPositions();
        generateRound();
        return true;
      }

      function resolveSrsCommandMode(mode) {
        if (mode === "treble" || mode === "bass") {
          return mode;
        }

        return activeSrsMode;
      }

      function findKeyByNote(noteName) {
        return keyboard.querySelector(`[data-note="${noteName}"]`);
      }

      function keyCenterInKeyboard(noteName) {
        const key = findKeyByNote(noteName);

        if (!key) {
          return null;
        }

        const keyboardRect = keyboard.getBoundingClientRect();
        const keyRect = key.getBoundingClientRect();
        return keyRect.left - keyboardRect.left + (keyRect.width / 2);
      }

      function positionRangeBracketPair(startElement, endElement, range, labelPrefix = "") {
        const [rangeStart, rangeEnd] = range;
        const startCenter = keyCenterInKeyboard(rangeStart);
        const endCenter = keyCenterInKeyboard(rangeEnd);

        if (startCenter !== null) {
          startElement.style.left = `${startCenter}px`;
          startElement.dataset.note = labelPrefix ? `${labelPrefix} ${rangeStart}` : rangeStart;
        }

        if (endCenter !== null) {
          endElement.style.left = `${endCenter}px`;
          endElement.dataset.note = labelPrefix ? `${labelPrefix} ${rangeEnd}` : rangeEnd;
        }
      }

      function syncRangeBracketPositions() {
        positionRangeBracketPair(rangeBracketStart, rangeBracketEnd, selectedRange);

        const showManualRange = isRangeSelectorVisible && !isDoubleModeEnabled;
        rangeBracketStart.style.display = showManualRange ? "" : "none";
        rangeBracketEnd.style.display = showManualRange ? "" : "none";

        if (!isDoubleModeEnabled) {
          doubleRangeBassStart.style.display = "none";
          doubleRangeBassEnd.style.display = "none";
          doubleRangeTrebleStart.style.display = "none";
          doubleRangeTrebleEnd.style.display = "none";
          return;
        }

        positionRangeBracketPair(doubleRangeBassStart, doubleRangeBassEnd, activeDoubleRange("bass"), "Bass");
        positionRangeBracketPair(doubleRangeTrebleStart, doubleRangeTrebleEnd, activeDoubleRange("treble"), "Violine");
        const isEditable = isRangeSelectorVisible;
        doubleRangeBassStart.classList.toggle("is-passive", !isEditable);
        doubleRangeBassEnd.classList.toggle("is-passive", !isEditable);
        doubleRangeTrebleStart.classList.toggle("is-passive", !isEditable);
        doubleRangeTrebleEnd.classList.toggle("is-passive", !isEditable);
        doubleRangeBassStart.style.display = "";
        doubleRangeBassEnd.style.display = "";
        doubleRangeTrebleStart.style.display = "";
        doubleRangeTrebleEnd.style.display = "";
      }

      function noteOffset(step) {
        return `${step * -1}em`;
      }

      function stemDirection(step) {
        return step >= 5 ? "note-down" : "note-up";
      }

      function ledgerSteps(step) {
        if (step <= -6) {
          const steps = [];
          const lowestLedgerStep = step % 2 === 0 ? step : step + 1;

          for (let ledgerStep = -6; ledgerStep >= lowestLedgerStep; ledgerStep -= 2) {
            steps.push(ledgerStep);
          }

          return steps;
        }

        if (step >= 6) {
          const steps = [];
          const highestLedgerStep = step % 2 === 0 ? step : step - 1;

          for (let ledgerStep = 6; ledgerStep <= highestLedgerStep; ledgerStep += 2) {
            steps.push(ledgerStep);
          }

          return steps;
        }

        return [];
      }

      function createNoteSlot(note, index) {
        const slot = document.createElement("div");
        slot.className = "note-slot";

        if (index === activeIndex) {
          slot.classList.add("is-current");
        }

        for (const step of ledgerSteps(note.step)) {
          const ledgerLine = document.createElement("div");
          ledgerLine.className = "ledger-line";
          ledgerLine.style.setProperty("--offset", noteOffset(step));
          slot.appendChild(ledgerLine);
        }

        const noteElement = document.createElement("div");
        noteElement.className = `note ${stemDirection(note.step)}`;
        noteElement.style.setProperty("--offset", noteOffset(note.step));
        noteElement.setAttribute("role", "img");
        noteElement.setAttribute("aria-label", note.name);

        if (note.state === "correct") {
          noteElement.classList.add("is-correct");
        }

        if (note.state === "wrong") {
          noteElement.classList.add("is-wrong");
        }

        slot.appendChild(noteElement);

        if (note.isNew) {
          const badgeElement = document.createElement("div");
          badgeElement.className = "note-badge";
          badgeElement.style.setProperty("--offset", noteOffset(note.step));
          badgeElement.setAttribute("aria-hidden", "true");
          badgeElement.textContent = "!";
          slot.appendChild(badgeElement);
        }

        return slot;
      }

      function renderNotes() {
        const fragment = document.createDocumentFragment();

        currentNotes.forEach((note, index) => {
          fragment.appendChild(createNoteSlot(note, index));
        });

        notesContainer.replaceChildren(fragment);
        renderKeyboardState();
      }

      function renderDoubleNotes() {
        const bassFragment = document.createDocumentFragment();
        const trebleFragment = document.createDocumentFragment();

        doubleRound.bass.forEach((note, index) => {
          bassFragment.appendChild(createNoteSlot(note, index));
        });

        doubleRound.treble.forEach((note, index) => {
          trebleFragment.appendChild(createNoteSlot(note, index));
        });

        doubleBassNotesContainer.replaceChildren(bassFragment);
        doubleTrebleNotesContainer.replaceChildren(trebleFragment);
        renderKeyboardState();
      }

      function clearKeyboardStates() {
        for (const key of document.querySelectorAll(".white-key, .black-key")) {
          key.classList.remove("is-target", "is-correct", "is-wrong", "is-in-range", "is-range-start", "is-range-end");
          delete key.dataset.label;
        }
      }

      function renderKeyboardState() {
        clearKeyboardStates();

        const [rangeStart, rangeEnd] = selectedRange;
        const startMidi = semitoneValue(rangeStart);
        const endMidi = semitoneValue(rangeEnd);

        for (const key of document.querySelectorAll(".white-key, .black-key")) {
          const keyMidi = Number(key.dataset.midi);

          if (keyMidi >= startMidi && keyMidi <= endMidi) {
            key.classList.add("is-in-range");
          }

          if (keyMidi === startMidi) {
            key.classList.add("is-range-start");
          }

          if (keyMidi === endMidi) {
            key.classList.add("is-range-end");
          }
        }

        syncRangeBracketPositions();
        renderKeyboardLevels();

        for (const midi of correctMidiNotes) {
          const correctKey = document.querySelector(`[data-midi="${midi}"]`);
          if (correctKey) {
            correctKey.classList.add("is-correct");
            correctKey.dataset.label = displayNoteName(correctKey.dataset.note);
          }
        }

        const activeNote = isDoubleModeEnabled
          ? [
              doubleRound.bass[activeIndex] && !doublePairState[activeIndex]?.bassDone ? doubleRound.bass[activeIndex] : null,
              doubleRound.treble[activeIndex] && !doublePairState[activeIndex]?.trebleDone ? doubleRound.treble[activeIndex] : null
            ].filter(Boolean)
          : currentNotes[activeIndex];

        if ((!isDoubleModeEnabled && !activeNote) || (isDoubleModeEnabled && activeNote.length === 0)) {
          targetDescription.innerHTML = "Alle Noten geschafft.";
          return;
        }

        if (isDoubleModeEnabled) {
          const descriptions = [];

          activeNote.forEach((note) => {
            const targetKey = document.querySelector(`[data-midi="${note.midi}"]`);
            descriptions.push(`${clefConfigs[note.clef].label}: ${displayNoteName(note.name)}`);

            if (targetKey) {
              targetKey.dataset.label = displayNoteName(note.name);

              if (!targetKey.classList.contains("is-correct") && !targetKey.classList.contains("is-wrong")) {
                targetKey.classList.add("is-target");
              }

              if (note.state === "correct") {
                targetKey.classList.remove("is-target");
                targetKey.classList.add("is-correct");
              }

              if (note.state === "wrong") {
                targetKey.classList.remove("is-target");
                targetKey.classList.add("is-wrong");
              }
            }
          });

          targetDescription.innerHTML = `<strong>${descriptions.join(" | ")}</strong>`;
        } else {
          syncClefToActiveNote();

          const handLabel = clefConfigs[currentClef].handLabel ? `, ${clefConfigs[currentClef].handLabel}` : "";
          targetDescription.innerHTML = `${clefConfigs[currentClef].label}${handLabel}: <strong>${displayNoteName(activeNote.name)}</strong>`;

          const targetKey = document.querySelector(`[data-midi="${activeNote.midi}"]`);
          if (targetKey) {
            targetKey.dataset.label = displayNoteName(activeNote.name);

            if (!targetKey.classList.contains("is-correct") && !targetKey.classList.contains("is-wrong")) {
              targetKey.classList.add("is-target");
            }

            if (activeNote.state === "correct") {
              targetKey.classList.remove("is-target");
              targetKey.classList.add("is-correct");
            }

            if (activeNote.state === "wrong") {
              targetKey.classList.remove("is-target");
              targetKey.classList.add("is-wrong");
            }
          }
        }

        if (lastPlayedMidi !== null && lastPlayedMidi !== activeNote.midi) {
          const wrongKey = document.querySelector(`[data-midi="${lastPlayedMidi}"]`);
          if (wrongKey) {
            wrongKey.classList.add("is-wrong");
            wrongKey.dataset.label = displayNoteName(wrongKey.dataset.note);
          }
        }
      }

      function syncClefToActiveNote() {
        const activeNote = currentNotes[activeIndex];
        const nextClef = activeNote?.clef || "treble";

        if (nextClef === currentClef) {
          return;
        }

        currentClef = nextClef;
        updateClefUi();
      }

      function generateRound() {
        if (isDoubleModeEnabled) {
          generateDoubleRound();
          return;
        }

        if (activeSrsMode) {
          applySrsRange();
        }

        currentNotes = Array.from({ length: noteCount }, () => ({
          ...randomNote(),
          state: "idle"
        }));
        activeIndex = 0;
        currentClef = currentNotes[0]?.clef || "treble";
        lastPlayedMidi = null;
        correctMidiNotes = new Set();
        updateClefUi();
        renderNotes();
        updateSrsUi();
      }

      function generateDoubleRound() {
        const bassSelectedRange = activeDoubleRange("bass");
        const trebleSelectedRange = activeDoubleRange("treble");
        const bassRange = buildRange(bassSelectedRange[0], bassSelectedRange[1], clefConfigs.bass.reference);
        const trebleRange = buildRange(trebleSelectedRange[0], trebleSelectedRange[1], clefConfigs.treble.reference);

        doubleRound = {
          bass: Array.from({ length: noteCount }, () => ({
            ...decorateNote(bassRange[Math.floor(Math.random() * bassRange.length)], "bass"),
            state: "idle"
          })),
          treble: Array.from({ length: noteCount }, () => ({
            ...decorateNote(trebleRange[Math.floor(Math.random() * trebleRange.length)], "treble"),
            state: "idle"
          }))
        };
        doublePairState = Array.from({ length: noteCount }, () => ({ bassDone: false, trebleDone: false }));
        activeIndex = 0;
        lastPlayedMidi = null;
        correctMidiNotes = new Set();
        currentClef = "treble";
        doubleBassClef.innerHTML = clefSvgMarkup.bass || "";
        doubleTrebleClef.innerHTML = clefSvgMarkup.treble || "";
        renderDoubleNotes();
        updateSrsUi();
      }

      function refreshCurrentMarker() {
        Array.from(notesContainer.children).forEach((slot, index) => {
          slot.classList.toggle("is-current", index === activeIndex);
        });
      }

      function setActiveState(state) {
        const activeNote = currentNotes[activeIndex];

        if (!activeNote) {
          return;
        }

        activeNote.state = state;
        renderNotes();
      }

      function handlePlayedMidi(midiNote) {
        if (isDoubleModeEnabled) {
          handlePlayedMidiDouble(midiNote);
          return;
        }

        const activeNote = currentNotes[activeIndex];
        lastPlayedMidi = midiNote;

        if (!activeNote) {
          return;
        }

        if (midiNote === activeNote.midi) {
          const rangeChanged = recordSrsAttempt(true);
          const state = activeSrsState();
          recordNoteStat(activeNote.clef, activeNote.name, true);
          if (activeNote.isNew && state) {
            state.newNotes = state.newNotes.filter((noteName) => noteName !== activeNote.name);
          }
          correctMidiNotes.add(midiNote);
          lastPlayedMidi = null;
          activeNote.state = "correct";
          activeIndex += 1;

          if (rangeChanged) {
            generateRound();
            return;
          }

          renderNotes();
          refreshCurrentMarker();

          if (activeIndex >= currentNotes.length) {
            window.setTimeout(generateRound, 900);
          }

          return;
        }

        const rangeChanged = recordSrsAttempt(false);
        recordNoteStat(activeNote.clef, activeNote.name, false);
        setActiveState("wrong");

        if (rangeChanged) {
          window.setTimeout(generateRound, 350);
          return;
        }

        window.setTimeout(() => {
          lastPlayedMidi = null;
          if (currentNotes[activeIndex] && currentNotes[activeIndex].state === "wrong") {
            setActiveState("idle");
          }
        }, 350);
      }

      function handlePlayedMidiDouble(midiNote) {
        const bassNote = doubleRound.bass[activeIndex];
        const trebleNote = doubleRound.treble[activeIndex];
        const pairState = doublePairState[activeIndex];
        lastPlayedMidi = midiNote;

        if (!bassNote || !trebleNote || !pairState) {
          return;
        }

        let matched = false;

        if (!pairState.bassDone && midiNote === bassNote.midi) {
          matched = true;
          pairState.bassDone = true;
          bassNote.state = "correct";
          correctMidiNotes.add(midiNote);
          recordNoteStat("bass", bassNote.name, true);
        }

        if (!pairState.trebleDone && midiNote === trebleNote.midi) {
          matched = true;
          pairState.trebleDone = true;
          trebleNote.state = "correct";
          correctMidiNotes.add(midiNote);
          recordNoteStat("treble", trebleNote.name, true);
        }

        if (matched) {
          lastPlayedMidi = null;
          renderDoubleNotes();

          if (pairState.bassDone && pairState.trebleDone) {
            activeIndex += 1;
            renderDoubleNotes();

            if (activeIndex >= noteCount) {
              window.setTimeout(generateRound, 900);
            }
          }

          return;
        }

        if (!pairState.bassDone) {
          bassNote.state = "wrong";
          recordNoteStat("bass", bassNote.name, false);
        }

        if (!pairState.trebleDone) {
          trebleNote.state = "wrong";
          recordNoteStat("treble", trebleNote.name, false);
        }

        renderDoubleNotes();

        window.setTimeout(() => {
          lastPlayedMidi = null;
          if (doubleRound.bass[activeIndex] && !doublePairState[activeIndex]?.bassDone) {
            doubleRound.bass[activeIndex].state = "idle";
          }
          if (doubleRound.treble[activeIndex] && !doublePairState[activeIndex]?.trebleDone) {
            doubleRound.treble[activeIndex].state = "idle";
          }
          renderDoubleNotes();
        }, 350);
      }

      function onMidiMessage(event) {
        const [status, noteNumber, velocity] = event.data;
        const messageType = status & 0xf0;

        sendMidiToOutputs(Array.from(event.data));

        if (messageType === 0x90 && velocity > 0) {
          handlePlayedMidi(noteNumber);
        }
      }

      function bindMidiInputs(midiAccess) {
        for (const input of midiAccess.inputs.values()) {
          input.onmidimessage = input.state === "connected" ? onMidiMessage : null;
        }

        bindMidiOutputs(midiAccess);
        updateMidiUi(hasConnectedMidiInput(midiAccess) || hasConnectedMidiOutput(midiAccess));
      }

      async function initMidi() {
        if (!("requestMIDIAccess" in navigator)) {
          updateMidiUi(false);
          return;
        }

        try {
          midiAccessRef = await navigator.requestMIDIAccess();
          bindMidiInputs(midiAccessRef);
          midiAccessRef.onstatechange = () => bindMidiInputs(midiAccessRef);
        } catch (error) {
          updateMidiUi(false);
        }
      }

      function updateClefUi() {
        const config = clefConfigs[currentClef];
        clefSymbol.innerHTML = clefSvgMarkup[currentClef] || "";
        clefSymbol.dataset.clef = currentClef;
        syncRangeBracketPositions();
      }

      function updateSelectedRangeByEdge(edge, noteName) {
        if (activeSrsMode) {
          return;
        }

        const options = selectableRangeOptions().map((note) => note.name);

        if (!options.includes(noteName)) {
          return;
        }

        const [currentStart, currentEnd] = selectedRange;
        const nextIndex = options.indexOf(noteName);
        let nextRange = selectedRange;

        if (edge === "start") {
          const endIndex = options.indexOf(currentEnd);
          nextRange = nextIndex > endIndex ? [noteName, noteName] : [noteName, currentEnd];
        } else {
          const startIndex = options.indexOf(currentStart);
          nextRange = nextIndex < startIndex ? [noteName, noteName] : [currentStart, noteName];
        }

        if (nextRange[0] === currentStart && nextRange[1] === currentEnd) {
          return;
        }

        selectedRange = nextRange;
        manualSelectedRange = [...selectedRange];
        queueRemoteSave("manual-range");
        generateRound();
      }

      function updateDoubleSelectedRange(mode, edge, noteName) {
        const options = rangeOptionsForMode(mode).map((note) => note.name);

        if (!options.includes(noteName)) {
          return;
        }

        const currentRange = activeDoubleRange(mode);
        const [currentStart, currentEnd] = currentRange;
        const nextIndex = options.indexOf(noteName);
        let nextRange = currentRange;

        if (edge === "start") {
          const endIndex = options.indexOf(currentEnd);
          nextRange = nextIndex > endIndex ? [noteName, noteName] : [noteName, currentEnd];
        } else {
          const startIndex = options.indexOf(currentStart);
          nextRange = nextIndex < startIndex ? [noteName, noteName] : [currentStart, noteName];
        }

        if (nextRange[0] === currentStart && nextRange[1] === currentEnd) {
          return;
        }

        doubleSelectedRanges[mode] = nextRange;
        syncRangeBracketPositions();
        queueRemoteSave("double-range");
        generateDoubleRound();
      }

      function nearestAvailableNoteFromPointer(clientX, mode = null) {
        const options = mode ? rangeOptionsForMode(mode) : selectableRangeOptions();
        let nearest = null;
        let nearestDistance = Number.POSITIVE_INFINITY;

        for (const option of options) {
          const center = keyCenterInKeyboard(option.name);

          if (center === null) {
            continue;
          }

          const distance = Math.abs(clientX - (keyboard.getBoundingClientRect().left + center));
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearest = option.name;
          }
        }

        return nearest;
      }

      function updateDraggedRange(clientX) {
        if (!activeDragEdge) {
          return;
        }

        const [mode, edge] = activeDragEdge.split(":");
        const targetMode = mode === "manual" ? null : mode;
        const targetEdge = edge || mode;
        const nextNote = nearestAvailableNoteFromPointer(clientX, targetMode);
        if (!nextNote) {
          return;
        }

        if (targetMode) {
          updateDoubleSelectedRange(targetMode, targetEdge, nextNote);
          return;
        }

        updateSelectedRangeByEdge(targetEdge, nextNote);
      }

      function beginRangeDrag(edge, event) {
        activeDragEdge = edge;
        event.currentTarget.classList.add("is-dragging");
        event.currentTarget.setPointerCapture(event.pointerId);
        updateDraggedRange(event.clientX);
      }

      function moveRangeDrag(event) {
        if (!activeDragEdge) {
          return;
        }

        updateDraggedRange(event.clientX);
      }

      function endRangeDrag(event) {
        activeDragEdge = null;
        event.currentTarget.classList.remove("is-dragging");
        if (event.currentTarget.hasPointerCapture(event.pointerId)) {
          event.currentTarget.releasePointerCapture(event.pointerId);
        }
      }

      toggleRangeButton.addEventListener("click", () => {
        if (activeSrsMode) {
          return;
        }

        isRangeSelectorVisible = !isRangeSelectorVisible;
        toggleRangeButton.classList.toggle("is-active", isRangeSelectorVisible);
        keyboardKeys.classList.toggle("is-cut-mode", isRangeSelectorVisible);
        if (isRangeSelectorVisible && !isKeyboardVisible) {
          isKeyboardVisible = true;
          toggleKeyboardButton.classList.add("is-active");
          keyboard.classList.remove("is-hidden");
          window.requestAnimationFrame(syncRangeBracketPositions);
        }
        syncRangeBracketPositions();
      });
      toggleKeyboardButton.addEventListener("click", () => {
        isKeyboardVisible = !isKeyboardVisible;
        toggleKeyboardButton.classList.toggle("is-active", isKeyboardVisible);
        keyboard.classList.toggle("is-hidden", !isKeyboardVisible);
        if (isKeyboardVisible) {
          window.requestAnimationFrame(syncRangeBracketPositions);
        }
        window.requestAnimationFrame(renderKeyboardLevels);
      });
      toggleInfoButton.addEventListener("click", () => {
        isInfoVisible = !isInfoVisible;
        updateInfoUi();
      });
      toggleLibraryButton.addEventListener("click", () => {
        isLibraryVisible = !isLibraryVisible;
        updateLibraryUi();
      });
      toggleDoubleButton.addEventListener("click", () => {
        isDoubleModeEnabled = !isDoubleModeEnabled;

        if (isDoubleModeEnabled) {
          activeSrsMode = null;
          updateSrsUi();
        }

        toggleRangeButton.classList.toggle("is-active", isRangeSelectorVisible);
        keyboardKeys.classList.toggle("is-cut-mode", isRangeSelectorVisible);
        syncRangeBracketPositions();
        updateModeUi();
        generateRound();
      });
      function toggleSrsMode(mode) {
        if (isDoubleModeEnabled) {
          isDoubleModeEnabled = false;
          updateModeUi();
        }

        const nextMode = activeSrsMode === mode ? null : mode;

        if (activeSrsMode === null) {
          manualSelectedRange = [...selectedRange];
        }

        activeSrsMode = nextMode;

        if (activeSrsMode) {
          isRangeSelectorVisible = false;
          toggleRangeButton.classList.remove("is-active");
          keyboardKeys.classList.remove("is-cut-mode");
          srsStates[activeSrsMode] = srsStates[activeSrsMode] || createInitialSrsState(activeSrsMode);
          applySrsRange();
        } else {
          selectedRange = [...manualSelectedRange];
        }

        updateSrsUi();
        syncRangeBracketPositions();
        queueRemoteSave("srs-mode");
        generateRound();
      }

      toggleSrsTrebleButton.addEventListener("click", () => toggleSrsMode("treble"));
      toggleSrsBassButton.addEventListener("click", () => toggleSrsMode("bass"));
      rangeBracketEnd.addEventListener("pointerdown", (event) => beginRangeDrag("manual:end", event));
      rangeBracketStart.addEventListener("pointerdown", (event) => beginRangeDrag("manual:start", event));
      rangeBracketStart.addEventListener("pointermove", moveRangeDrag);
      rangeBracketEnd.addEventListener("pointermove", moveRangeDrag);
      rangeBracketStart.addEventListener("pointerup", endRangeDrag);
      rangeBracketEnd.addEventListener("pointerup", endRangeDrag);
      rangeBracketStart.addEventListener("pointercancel", endRangeDrag);
      rangeBracketEnd.addEventListener("pointercancel", endRangeDrag);
      doubleRangeBassStart.addEventListener("pointerdown", (event) => beginRangeDrag("bass:start", event));
      doubleRangeBassEnd.addEventListener("pointerdown", (event) => beginRangeDrag("bass:end", event));
      doubleRangeTrebleStart.addEventListener("pointerdown", (event) => beginRangeDrag("treble:start", event));
      doubleRangeTrebleEnd.addEventListener("pointerdown", (event) => beginRangeDrag("treble:end", event));
      doubleRangeBassStart.addEventListener("pointermove", moveRangeDrag);
      doubleRangeBassEnd.addEventListener("pointermove", moveRangeDrag);
      doubleRangeTrebleStart.addEventListener("pointermove", moveRangeDrag);
      doubleRangeTrebleEnd.addEventListener("pointermove", moveRangeDrag);
      doubleRangeBassStart.addEventListener("pointerup", endRangeDrag);
      doubleRangeBassEnd.addEventListener("pointerup", endRangeDrag);
      doubleRangeTrebleStart.addEventListener("pointerup", endRangeDrag);
      doubleRangeTrebleEnd.addEventListener("pointerup", endRangeDrag);
      doubleRangeBassStart.addEventListener("pointercancel", endRangeDrag);
      doubleRangeBassEnd.addEventListener("pointercancel", endRangeDrag);
      doubleRangeTrebleStart.addEventListener("pointercancel", endRangeDrag);
      doubleRangeTrebleEnd.addEventListener("pointercancel", endRangeDrag);
      window.addEventListener("resize", () => {
        syncRangeBracketPositions();
        renderKeyboardLevels();
      });

      window.srsLevelUp = (mode = null) => {
        const targetMode = resolveSrsCommandMode(mode);
        if (!targetMode) {
          console.warn("[SRS] Kein Modus aktiv. Nutze srsLevelUp('treble') oder srsLevelUp('bass').");
          return false;
        }

        const state = srsStates[targetMode] = srsStates[targetMode] || createInitialSrsState(targetMode);
        return applyManualSrsLevel(targetMode, state.level + 1);
      };

      window.srsLevelDown = (mode = null) => {
        const targetMode = resolveSrsCommandMode(mode);
        if (!targetMode) {
          console.warn("[SRS] Kein Modus aktiv. Nutze srsLevelDown('treble') oder srsLevelDown('bass').");
          return false;
        }

        const state = srsStates[targetMode] = srsStates[targetMode] || createInitialSrsState(targetMode);
        return applyManualSrsLevel(targetMode, state.level - 1);
      };

      window.srsSetLevel = (level, mode = null) => {
        const targetMode = resolveSrsCommandMode(mode);
        if (!targetMode) {
          console.warn("[SRS] Kein Modus aktiv. Nutze srsSetLevel(3, 'treble') oder srsSetLevel(2, 'bass').");
          return false;
        }

        return applyManualSrsLevel(targetMode, Number(level));
      };

      window.srsStatus = (mode = null) => {
        const targetMode = resolveSrsCommandMode(mode);
        if (!targetMode) {
          console.warn("[SRS] Kein Modus aktiv. Nutze srsStatus('treble') oder srsStatus('bass').");
          return null;
        }

        const state = srsStates[targetMode] = srsStates[targetMode] || createInitialSrsState(targetMode);
        const range = srsRangeFromState(targetMode, state);
        const status = {
          mode: targetMode,
          level: state.level,
          range,
          attempts: state.attempts.length,
          accuracy: currentSrsAccuracy()
        };
        console.log("[SRS]", status);
        return status;
      };

      authSignInButton.addEventListener("click", () => handleAuthAction("sign-in"));
      authSignUpButton.addEventListener("click", () => handleAuthAction("sign-up"));
      authSignOutButton.addEventListener("click", () => handleSignOut());

      buildKeyboard();
      renderLibraryPanel();
      keyboardKeys.classList.toggle("is-cut-mode", isRangeSelectorVisible);
      currentClef = "treble";
      updateInfoUi();
      updateLibraryUi();
      updateModeUi();
      updateLevelUi();
      updateClefUi();
      updateSrsUi();
      generateRound();
      initMidi();
      initSupabase();
    </script>
  </body>
</html>
